name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Unit and end-to-end tests
        run: python -m unittest discover -s tests -v
      - name: Compile check
        run: python -m compileall repo_launch_doctor tests
      - name: Self scan
        run: python -m repo_launch_doctor scan . --output reports/self --fail-on high
