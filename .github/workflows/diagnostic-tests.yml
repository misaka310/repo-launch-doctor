name: Diagnostic Tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Capture full test output
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -v > diagnostic-test-output.txt 2>&1
          echo "$?" > diagnostic-exit-code.txt
          exit 0
      - name: Upload diagnostic output
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-test-output
          path: |
            diagnostic-test-output.txt
            diagnostic-exit-code.txt
